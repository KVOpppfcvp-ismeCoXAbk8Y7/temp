worker_processes auto;

events {
  worker_connections 1024;
}

http {
  include /etc/nginx/mime.types;

  default_type application/octet-stream;

  server_tokens off;

  sendfile on;

  tcp_nopush on;
  tcp_nodelay on;

  keepalive_timeout 65s;

  gzip on;
  gzip_comp_level 5;
  gzip_min_length 512;
  gzip_types text/plain text/css application/json application/javascript application/xml+rss image/svg+xml;

  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }

  limit_req_zone $binary_remote_addr zone=limig_req_client:10m rate=200r/s;
  limit_conn_zone $binary_remote_addr zone=limit_conn_client:10m;

  limit_req_zone $binary_remote_addr zone=limit_req_api:10m rate=10r/s;
  limit_conn_zone $binary_remote_addr zone=limit_conn_api:10m;

  log_format main '$remote_addr - $request_id - $remote_user [$time_local] "$request" $status $body_bytes_sent '
    '"$http_referer" "$http_user_agent" "$http_x_forwarded_for"';

  access_log /var/log/nginx/access.log main;
  error_log /var/log/nginx/error.log warn;

  upstream ${CLIENT_HOST}_i {
    server ${CLIENT_HOST}:${CLIENT_PORT};
    keepalive 32;
  }

  upstream ${API_HOST}_i {
    server ${API_HOST}:${API_PORT};
    keepalive 64;
  }

  server {
    listen ${PORT};
    server_name _;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    proxy_hide_header Server;
    proxy_hide_header X-Powered-By;


    location / {
      if ($request_method !~ ^GET$) { return 405; }

      limit_req zone=limig_req_client burst=200 nodelay;
      limit_conn limit_conn_client 50;

      proxy_http_version 1.1;

      proxy_set_header Host yawb4h;
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_set_header X-Request-Id "";
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      proxy_read_timeout 60s;
      proxy_send_timeout 60s;

      proxy_pass http://${CLIENT_HOST}_i;
    }

    location /api {
      return 404;
    }

    location /api/ {
      if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH|OPTIONS)$) {
        return 405;
      }

      client_max_body_size 2m;

      limit_req zone=limit_req_api burst=20 nodelay;
      limit_conn limit_conn_api 10;

      proxy_http_version 1.1;

      proxy_set_header Host jsrv;
      proxy_set_header X-Forwarded-Host "";
      proxy_set_header X-Forwarded-For "";
      proxy_set_header X-Forwarded-Proto "";
      proxy_set_header X-Real-IP "";
      proxy_set_header X-Request-Id "";

      proxy_connect_timeout 5;
      proxy_read_timeout 30s;
      proxy_send_timeout 30s;

      proxy_pass http://${API_HOST}_i/;
    }

    location ~ /\.(git|hg|svn) {
      return 404;
    }
  }
}
